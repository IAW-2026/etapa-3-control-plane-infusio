name: Deploy to Vercel
on:
  pull_request:
    branches:
      - main
    types:
      - closed # 👈 Se dispara cuando el Pull Request se cierra

jobs:
  deploy:
    # Esta condición asegura que el deploy SÓLO corra si el PR se cerró porque se hizo MERGE.
    # Si el PR se cierra (close) sin aceptar los cambios, el deploy no se ejecutará.
    if: github.event.pull_request.merged == true
    
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
